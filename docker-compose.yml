version: "3.9"

services:
  fas-inspector:
    build: .
    container_name: fas_inspector_hercules
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./config:/app/config
    environment:
      - OCR_USE_GPU=false
      - API_DEBUG=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3